<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>II Innovathon Contagil 2026 - Placar</title>
    <link rel="stylesheet" href="/static/style.css?v={{ range(100000)|random }}">
</head>
<body class="public">
    <header>
        <h1>II INNOVATHON CONTÁGIL 2026</h1>
        <p class="subtitle">PLACAR AO VIVO</p>
    </header>

    <main id="ranking" class="ranking"></main>

    <!-- Overlay do buzzer (quem apertou primeiro) -->
    <div id="buzzer-overlay" class="buzzer-overlay" style="display:none;">
        <div class="buzzer-card">
            <div class="buzzer-label">APERTOU PRIMEIRO</div>
            <div class="buzzer-jogador" id="buzzer-jogador">JOGADOR 1</div>
            <div class="buzzer-tempo" id="buzzer-tempo"></div>
        </div>
    </div>

    <footer>
        <span id="connection" class="dot disconnected"></span>
        <span id="connection-text">Conectando...</span>
    </footer>

    <template id="row-template">
        <div class="team-row" data-id="">
            <div class="team-main">
                <div class="pos"></div>
                <div class="team-info">
                    <div class="team-name"></div>
                </div>
                <div class="team-points">
                    <span class="points-val">0</span>
                    <span class="points-label">pts</span>
                </div>
            </div>
            <div class="team-detalhes" style="display:none;"></div>
        </div>
    </template>

    <script>
        const MY_VERSION = "{{ app_version }}";
        setInterval(async () => {
            try {
                const r = await fetch('/version', { cache: 'no-store' });
                const d = await r.json();
                if (d.version && d.version !== MY_VERSION) location.reload();
            } catch {}
        }, 5000);

        const ranking = document.getElementById('ranking');
        const rowTpl = document.getElementById('row-template');
        const conn = document.getElementById('connection');
        const connText = document.getElementById('connection-text');

        let equipes = [], provas = [], lancamentos = [];
        let anim = { count_ms: 500, reorder_ms: 650, flash_ms: 1200 };
        let expandida = null; // id

        function corStyle(eq) {
            return eq.cor_hex ? `--team-c:${eq.cor_hex}; --team-glow:${eq.cor_hex}88;` : '';
        }
        function corClass(eq) {
            return eq.cor_hex ? '' : ('team-color-' + (eq.cor_idx || 1));
        }
        function tipoTag(tipo) {
            const labels = { basica: 'BASICA', dinamica: 'DINAMICA', principal: 'PRINCIPAL' };
            return `<span class="prova-tag tipo-${tipo}">${labels[tipo] || tipo}</span>`;
        }

        function animatePoints(el, to, durationMs = 600) {
            const from = parseInt(el.textContent) || 0;
            if (from === to) return;
            const start = performance.now();
            function tick(now) {
                const t = Math.min(1, (now - start) / durationMs);
                const eased = 1 - Math.pow(1 - t, 3);
                el.textContent = Math.round(from + (to - from) * eased);
                if (t < 1) requestAnimationFrame(tick);
                else el.textContent = to;
            }
            requestAnimationFrame(tick);
        }

        function detalhesHtml(eq) {
            const lancs = lancamentos.filter(l => l.equipe_id === eq.id);
            if (lancs.length === 0) return '<p class="empty-det">Sem lancamentos ainda.</p>';
            let total = 0;
            const html = lancs.map(l => {
                const pr = provas.find(p => p.id === l.prova_id);
                if (!pr) return '';
                total += l.valor;
                let crits = '';
                if (l.criterios_valores) {
                    crits = '<ul class="criterios-list">' +
                        Object.entries(l.criterios_valores).map(([n, v]) => `<li><span>${n}</span> <strong>${v}</strong></li>`).join('') +
                        '</ul>';
                }
                return `<div class="lancamento-pub">
                    <div class="lanc-head">${tipoTag(pr.tipo)} <strong>${pr.nome}</strong> <span class="lanc-pts">${l.valor} / ${pr.max_pontos}</span></div>
                    ${crits}
                </div>`;
            }).join('');
            return html + `<div class="det-total">TOTAL <strong>${total}</strong> pts</div>`;
        }

        function render() {
            const ord = [...equipes].sort((a, b) => (b.pontos || 0) - (a.pontos || 0) || a.id - b.id);

            // FIRST: medir posicoes atuais
            const oldPositions = new Map();
            ranking.querySelectorAll('.team-row').forEach(r => {
                oldPositions.set(r.dataset.id, r.getBoundingClientRect().top);
            });

            if (ord.length === 0) {
                ranking.innerHTML = '<p class="empty">Aguardando equipes...</p>';
                return;
            }
            const emptyMsg = ranking.querySelector('.empty');
            if (emptyMsg) emptyMsg.remove();

            const existing = new Map();
            ranking.querySelectorAll('.team-row').forEach(r => existing.set(r.dataset.id, r));
            const newOrder = [];
            const idsAtivos = new Set();

            ord.forEach((eq, idx) => {
                const id = String(eq.id);
                idsAtivos.add(id);
                let row = existing.get(id);
                if (!row) {
                    const node = rowTpl.content.cloneNode(true);
                    row = node.querySelector('.team-row');
                    row.dataset.id = id;
                }
                row.className = 'team-row ' + (corClass(eq) || '');
                row.setAttribute('style', corStyle(eq));
                if (idx === 0 && (eq.pontos || 0) > 0) row.classList.add('leader');
                if (expandida === eq.id) row.classList.add('expanded');
                row.querySelector('.pos').textContent = idx + 1;
                row.querySelector('.team-name').textContent = eq.nome;
                animatePoints(row.querySelector('.points-val'), eq.pontos || 0, anim.count_ms);
                // detalhes
                const det = row.querySelector('.team-detalhes');
                det.innerHTML = detalhesHtml(eq);
                det.style.display = expandida === eq.id ? 'block' : 'none';
                newOrder.push(row);
            });

            existing.forEach((row, id) => {
                if (!idsAtivos.has(id)) row.remove();
            });

            newOrder.forEach(row => ranking.appendChild(row));

            // FLIP animation
            newOrder.forEach(row => {
                const id = row.dataset.id;
                const oldTop = oldPositions.get(id);
                if (oldTop === undefined) return;
                const newTop = row.getBoundingClientRect().top;
                const dy = oldTop - newTop;
                if (Math.abs(dy) < 1) return;
                const existingStyle = row.getAttribute('style') || '';
                row.style.transition = 'none';
                row.style.transform = `translateY(${dy}px)`;
                row.getBoundingClientRect();
                row.style.transition = `transform ${anim.reorder_ms}ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease`;
                row.style.transform = '';
                row.classList.add('moving');
                setTimeout(() => {
                    row.classList.remove('moving');
                    row.style.transition = '';
                    row.style.transform = '';
                }, anim.reorder_ms + 50);
            });
        }

        function applySnapshot(s) {
            equipes = s.equipes || [];
            provas = s.provas || [];
            lancamentos = s.lancamentos || [];
            if (s.animacao) anim = Object.assign(anim, s.animacao);
            if (s.buzzer) aplicarBuzzer(s.buzzer);
            render();
        }

        // ===== BUZZER overlay =====
        const buzzerOverlay = document.getElementById('buzzer-overlay');
        const buzzerJogador = document.getElementById('buzzer-jogador');
        const buzzerTempo = document.getElementById('buzzer-tempo');

        function aplicarBuzzer(b) {
            if (b && b.vencedor && b.vencedor > 0) {
                buzzerJogador.textContent = 'JOGADOR ' + b.vencedor;
                buzzerOverlay.className = 'buzzer-overlay jogador-' + b.vencedor;
                buzzerTempo.textContent = '';  // tempo opcional; pode exibir b.tempo_us depois
                buzzerOverlay.style.display = 'flex';
            } else {
                buzzerOverlay.style.display = 'none';
            }
        }

        function flashRow(id) {
            const row = ranking.querySelector(`.team-row[data-id="${id}"]`);
            if (row) {
                row.style.setProperty('--flash-dur', `${anim.flash_ms}ms`);
                row.classList.add('flash');
                setTimeout(() => row.classList.remove('flash'), anim.flash_ms);
            }
        }

        // Click pra expandir/colapsar
        ranking.addEventListener('click', e => {
            const row = e.target.closest('.team-row');
            if (!row) return;
            const id = parseInt(row.dataset.id);
            expandida = expandida === id ? null : id;
            render();
        });

        function connect() {
            const es = new EventSource('/stream');
            es.onopen = () => {
                conn.classList.remove('disconnected');
                conn.classList.add('connected');
                connText.textContent = 'Conectado';
            };
            es.onerror = () => {
                conn.classList.remove('connected');
                conn.classList.add('disconnected');
                connText.textContent = 'Reconectando...';
            };
            es.addEventListener('snapshot', e => applySnapshot(JSON.parse(e.data)));
            es.addEventListener('state', e => {
                const s = JSON.parse(e.data);
                // Detecta quais equipes tiveram pontos alterados para flash
                const novosEquipes = s.equipes || [];
                novosEquipes.forEach(neq => {
                    const old = equipes.find(o => o.id === neq.id);
                    if (old && (old.pontos || 0) !== (neq.pontos || 0)) {
                        setTimeout(() => flashRow(neq.id), 100);
                    }
                });
                applySnapshot(s);
            });
            es.addEventListener('animacao', e => {
                anim = Object.assign(anim, JSON.parse(e.data));
            });
            es.addEventListener('buzzer', e => aplicarBuzzer(JSON.parse(e.data)));
        }

        connect();
    </script>
</body>
</html>
