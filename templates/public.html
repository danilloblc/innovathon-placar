<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>II Innovathon Contagil 2026 - Placar</title>
    <link rel="stylesheet" href="/static/style.css?v={{ range(100000)|random }}">
</head>
<body class="public">
    <header>
        <h1>II INNOVATHON CONTÁGIL 2026</h1>
        <p class="subtitle">PLACAR AO VIVO</p>
    </header>

    <main id="ranking" class="ranking"></main>

    <footer>
        <span id="connection" class="dot disconnected"></span>
        <span id="connection-text">Conectando...</span>
    </footer>

    <template id="row-template">
        <div class="team-row" data-id="">
            <div class="pos"></div>
            <div class="team-info">
                <div class="team-name"></div>
            </div>
            <div class="team-points">
                <span class="points-val">0</span>
                <span class="points-label">pts</span>
            </div>
        </div>
    </template>

    <script>
        const MY_VERSION = "{{ app_version }}";
        setInterval(async () => {
            try {
                const r = await fetch('/version', { cache: 'no-store' });
                const d = await r.json();
                if (d.version && d.version !== MY_VERSION) location.reload();
            } catch {}
        }, 5000);

        const ranking = document.getElementById('ranking');
        const rowTpl = document.getElementById('row-template');
        const conn = document.getElementById('connection');
        const connText = document.getElementById('connection-text');

        let equipes = [];

        // Animacao de contagem dos pontos (count-up/down suave)
        function animatePoints(el, to, durationMs = 600) {
            const from = parseInt(el.textContent) || 0;
            if (from === to) return;
            const start = performance.now();
            function tick(now) {
                const t = Math.min(1, (now - start) / durationMs);
                const eased = 1 - Math.pow(1 - t, 3);  // ease-out cubic
                el.textContent = Math.round(from + (to - from) * eased);
                if (t < 1) requestAnimationFrame(tick);
                else el.textContent = to;
            }
            requestAnimationFrame(tick);
        }

        // FLIP animation: First (medir), Last (reposicionar), Invert (transform reverso), Play (transicao)
        function render() {
            const ord = [...equipes].sort((a, b) => b.pontos - a.pontos || a.id - b.id);

            // 1. FIRST: medir posicoes atuais
            const oldPositions = new Map();
            ranking.querySelectorAll('.team-row').forEach(r => {
                oldPositions.set(r.dataset.id, r.getBoundingClientRect().top);
            });

            // Estado vazio
            if (ord.length === 0) {
                ranking.innerHTML = '<p class="empty">Aguardando equipes...</p>';
                return;
            }
            const emptyMsg = ranking.querySelector('.empty');
            if (emptyMsg) emptyMsg.remove();

            // 2. LAST: atualizar DOM (reusar nodes existentes; criar novos; remover deletados)
            const existing = new Map();
            ranking.querySelectorAll('.team-row').forEach(r => existing.set(r.dataset.id, r));
            const newOrder = [];
            const idsAtivos = new Set();

            ord.forEach((eq, idx) => {
                const id = String(eq.id);
                idsAtivos.add(id);
                let row = existing.get(id);
                if (!row) {
                    const node = rowTpl.content.cloneNode(true);
                    row = node.querySelector('.team-row');
                    row.dataset.id = id;
                }
                // Reaplicar classes (cor pode ter mudado, lider tambem)
                row.className = 'team-row team-color-' + (eq.cor_idx || 1);
                if (idx === 0 && eq.pontos > 0) row.classList.add('leader');
                row.querySelector('.pos').textContent = idx + 1;
                row.querySelector('.team-name').textContent = eq.nome;
                // pontos: animacao count-up
                animatePoints(row.querySelector('.points-val'), eq.pontos, 500);
                newOrder.push(row);
            });

            // Remove rows de equipes deletadas
            existing.forEach((row, id) => {
                if (!idsAtivos.has(id)) row.remove();
            });

            // Reordena no DOM (move nodes para a nova posicao)
            newOrder.forEach(row => ranking.appendChild(row));

            // 3. INVERT + 4. PLAY
            newOrder.forEach(row => {
                const id = row.dataset.id;
                const oldTop = oldPositions.get(id);
                if (oldTop === undefined) return;  // novo node, sem animacao de movimento
                const newTop = row.getBoundingClientRect().top;
                const dy = oldTop - newTop;
                if (Math.abs(dy) < 1) return;
                row.style.transition = 'none';
                row.style.transform = `translateY(${dy}px)`;
                row.getBoundingClientRect();  // force reflow
                row.style.transition = 'transform 0.65s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s ease';
                row.style.transform = '';
                row.classList.add('moving');
                setTimeout(() => {
                    row.classList.remove('moving');
                    row.style.transition = '';
                }, 700);
            });
        }

        function applySnapshot(s) {
            equipes = s.equipes || [];
            render();
        }

        function flashRow(id) {
            const row = ranking.querySelector(`.team-row[data-id="${id}"]`);
            if (row) {
                row.classList.add('flash');
                setTimeout(() => row.classList.remove('flash'), 1200);
            }
        }

        function connect() {
            const es = new EventSource('/stream');
            es.onopen = () => {
                conn.classList.remove('disconnected');
                conn.classList.add('connected');
                connText.textContent = 'Conectado';
            };
            es.onerror = () => {
                conn.classList.remove('connected');
                conn.classList.add('disconnected');
                connText.textContent = 'Reconectando...';
            };
            es.addEventListener('snapshot', e => applySnapshot(JSON.parse(e.data)));
            es.addEventListener('equipes', e => applySnapshot(JSON.parse(e.data)));
            es.addEventListener('pontos', e => {
                const d = JSON.parse(e.data);
                const eq = equipes.find(x => x.id === d.id);
                if (eq) {
                    eq.pontos = d.pontos;
                    render();
                    flashRow(d.id);
                }
            });
        }

        connect();
    </script>
</body>
</html>
