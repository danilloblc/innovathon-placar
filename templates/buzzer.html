<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>II Innovathon - Buzzer</title>
    <link rel="stylesheet" href="/static/style.css?v={{ range(100000)|random }}">
</head>
<body class="buzzer-screen">
    <header>
        <h1>II INNOVATHON CONTÁGIL 2026</h1>
        <p class="subtitle" id="sub">QUEM APERTOU PRIMEIRO</p>
    </header>

    <main id="bz-main" class="bz-main">
        <!-- IDLE -->
        <div id="bz-idle" class="bz-idle">
            <div class="bz-idle-text">AGUARDANDO</div>
            <div class="bz-idle-sub">pressione o botão</div>
        </div>

        <!-- PERGUNTA -->
        <div id="bz-pergunta" class="bz-pergunta" style="display:none;">
            <div class="bz-categoria" id="bz-categoria"></div>
            <div class="bz-enunciado" id="bz-enunciado"></div>
            <div class="bz-resposta" id="bz-resposta" style="display:none;"></div>
        </div>

        <!-- DUELO DE EQUIPES (lado1 vs lado2) -->
        <div id="bz-duelo" class="bz-duelo" style="display:none;">
            <div class="bz-lado" id="bz-lado1">
                <div class="bz-lado-nome">—</div>
            </div>
            <div class="bz-vs">VS</div>
            <div class="bz-lado" id="bz-lado2">
                <div class="bz-lado-nome">—</div>
            </div>
        </div>
    </main>

    <footer>
        <span id="esp32-dot" class="dot disconnected"></span>
        <span id="esp32-text">Buzzer offline</span>
        <span style="margin: 0 10px; color: var(--border);">|</span>
        <span id="connection" class="dot disconnected"></span>
        <span id="connection-text">Conectando...</span>
    </footer>

    <script>
        const MY_VERSION = "{{ app_version }}";
        setInterval(async () => {
            try {
                const r = await fetch('/version', { cache: 'no-store' });
                const d = await r.json();
                if (d.version && d.version !== MY_VERSION) location.reload();
            } catch {}
        }, 5000);

        let equipes = [], quiz = null, buzzer = null;

        const elMain = document.getElementById('bz-main');
        const elIdle = document.getElementById('bz-idle');
        const elPergunta = document.getElementById('bz-pergunta');
        const elDuelo = document.getElementById('bz-duelo');
        const elCategoria = document.getElementById('bz-categoria');
        const elEnunciado = document.getElementById('bz-enunciado');
        const elResposta = document.getElementById('bz-resposta');
        const elLado1 = document.getElementById('bz-lado1');
        const elLado2 = document.getElementById('bz-lado2');
        const elSub = document.getElementById('sub');

        const conn = document.getElementById('connection');
        const connText = document.getElementById('connection-text');
        const espDot = document.getElementById('esp32-dot');
        const espText = document.getElementById('esp32-text');

        function equipePorId(id) { return equipes.find(e => e.id === id); }
        function corClass(eq) { return eq && !eq.cor_hex ? ('team-color-' + (eq.cor_idx || 1)) : ''; }
        function corStyle(eq) { return eq && eq.cor_hex ? `--team-c:${eq.cor_hex}; --team-glow:${eq.cor_hex}88;` : ''; }

        function pintaLado(elLado, eq, venceu) {
            elLado.className = 'bz-lado ' + (corClass(eq) || '') + (venceu ? ' venceu' : '');
            elLado.setAttribute('style', corStyle(eq));
            elLado.querySelector('.bz-lado-nome').textContent = eq ? eq.nome : '—';
        }

        function render() {
            if (!quiz) return;
            const modo = quiz.modo || 'idle';
            const venc = buzzer ? buzzer.vencedor : 0;  // 0,1,2
            const eq1 = equipePorId(quiz.lado1_equipe_id);
            const eq2 = equipePorId(quiz.lado2_equipe_id);

            // subtitulo conforme modo
            elSub.textContent = modo === 'teste' ? 'MODO TESTE'
                              : modo === 'pergunta' ? 'QUEM APERTOU PRIMEIRO'
                              : 'QUEM APERTOU PRIMEIRO';

            // bloco pergunta
            if (modo === 'pergunta' && quiz.pergunta) {
                elPergunta.style.display = 'block';
                elIdle.style.display = 'none';
                elCategoria.textContent = quiz.pergunta.categoria || '';
                elEnunciado.textContent = quiz.pergunta.enunciado || '';
                if (quiz.resposta_revelada && quiz.pergunta.resposta) {
                    elResposta.style.display = 'block';
                    elResposta.textContent = 'Resposta: ' + quiz.pergunta.resposta;
                } else {
                    elResposta.style.display = 'none';
                }
            } else {
                elPergunta.style.display = 'none';
            }

            // duelo de equipes (teste ou pergunta)
            if (modo === 'teste' || modo === 'pergunta') {
                elDuelo.style.display = 'flex';
                elIdle.style.display = 'none';
                pintaLado(elLado1, eq1, venc === 1);
                pintaLado(elLado2, eq2, venc === 2);
            } else {
                elDuelo.style.display = 'none';
            }

            // idle puro
            if (modo === 'idle') {
                elIdle.style.display = 'flex';
            }

            // destaque global quando alguem apertou
            elMain.className = 'bz-main' + (venc ? ' tem-vencedor' : '');
        }

        function aplicarSnapshot(s) {
            if (s.equipes) equipes = s.equipes;
            if (s.quiz) quiz = s.quiz;
            if (s.buzzer) buzzer = s.buzzer;
            if (s.esp32) aplicarEsp32(s.esp32);
            render();
        }

        function aplicarEsp32(e) {
            if (e && e.online) {
                const rssi = (e.rssi !== null && e.rssi !== undefined) ? ` (${e.rssi} dBm)` : '';
                espDot.className = 'dot connected';
                espText.textContent = 'Buzzer online' + rssi;
            } else {
                espDot.className = 'dot disconnected';
                espText.textContent = 'Buzzer offline';
            }
        }

        function connect() {
            const es = new EventSource('/stream');
            es.onopen = () => { conn.className = 'dot connected'; connText.textContent = 'Conectado'; };
            es.onerror = () => { conn.className = 'dot disconnected'; connText.textContent = 'Reconectando...'; };
            es.addEventListener('snapshot', e => aplicarSnapshot(JSON.parse(e.data)));
            es.addEventListener('state', e => aplicarSnapshot(JSON.parse(e.data)));
            es.addEventListener('quiz', e => { quiz = JSON.parse(e.data); render(); });
            es.addEventListener('buzzer', e => { buzzer = JSON.parse(e.data); render(); });
            es.addEventListener('esp32', e => aplicarEsp32(JSON.parse(e.data)));
        }
        connect();
    </script>
</body>
</html>
